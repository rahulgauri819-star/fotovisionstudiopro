<!DOCTYPE html>

<style>
/* Fix .main layout — gutted in style.css for owner dashboard fixed-page system */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: calc(var(--hh, 56px) + 20px) 16px 40px;
  min-height: 100vh;
  box-sizing: border-box;
}
@media (min-width: 600px) {
  .main { padding: calc(var(--hh, 56px) + 28px) 28px 48px; }
}
/* Hide tab-nav — framer is a standalone page */
.tab-nav { display: none !important; }

.framer-hero{
  background:linear-gradient(135deg,#0F0F0F,#1C1410);
  border-radius:var(--r-xl);
  padding:32px 28px;
  margin-bottom:20px;
  color:#fff;
  position:relative;
  overflow:hidden;
}
.framer-hero::before{
  content:'🖼️';font-size:120px;position:absolute;right:-10px;top:50%;transform:translateY(-50%);opacity:.06;pointer-events:none;
}
.framer-hero-title{font-family:'DM Serif Display',serif;font-size:28px;color:#E8C06A;margin-bottom:6px;}
.framer-hero-sub{font-size:13px;color:rgba(255,255,255,.5);}
.framer-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:20px;}
.framer-stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-md);padding:14px;text-align:center;}
.framer-stat-val{font-family:'DM Serif Display',serif;font-size:28px;color:#E8C06A;line-height:1;}
.framer-stat-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.07em;margin-top:4px;}
.job-card{
  background:#fff;
  border:1px solid var(--paper3);
  border-radius:var(--r-lg);
  padding:20px;
  margin-bottom:10px;
  box-shadow:var(--sh-sm);
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.job-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(to bottom,var(--gold-dk),var(--gold));}
.job-card.delivered::before{background:var(--ink3);}
.job-card:hover{box-shadow:var(--sh-md);}

/* ── RESPONSIVE 2-COL DESKTOP LAYOUT ── */
@media (min-width: 900px) {
  #framer-layout {
    grid-template-columns: 1fr 300px !important;
  }
  #framer-right {
    display: block !important;
  }
}
@media (min-width: 1200px) {
  #framer-layout {
    grid-template-columns: 1fr 340px !important;
  }
}
/* Make hero use full width on desktop */
.framer-hero {
  margin-bottom: 20px;
}
/* Bigger, more spacious job cards on desktop */
@media (min-width: 900px) {
  .job-card { padding: 24px 28px; }
  .framer-panel { padding: 28px; }
}
</style>
</head>
<body>

<header class="hdr">
  <a href="../index.html" class="hdr-logo">
    <img src="../logo.png" alt="FV" style="height:42px;border-radius:10px;display:block;">
  </a>
  <div class="hdr-right">
    <div class="role-pill">🖼️ Framer</div>
    <button class="btn-logout" onclick="doLogout()">Sign Out</button>
  </div>
</header>

<div class="main">

  <!-- Hero -->
  <div class="framer-hero">
    <div class="framer-hero-title">Framing Workshop</div>
    <div class="framer-hero-sub">Live view of all framing, sunboard & MDF jobs assigned to your station</div>
    <div class="framer-stats" style="grid-template-columns:1fr 1fr 1fr 1fr;">
      <div class="framer-stat"><div class="framer-stat-val" id="fs-today">0</div><div class="framer-stat-lbl">Today's Jobs</div></div>
      <div class="framer-stat"><div class="framer-stat-val" id="fs-active">0</div><div class="framer-stat-lbl">Total Due</div></div>
      <div class="framer-stat"><div class="framer-stat-val" id="fs-duetoday">0</div><div class="framer-stat-lbl">Due Today</div></div>
      <div class="framer-stat" style="background:#e53935;"><div class="framer-stat-val" id="fs-overdue">0</div><div class="framer-stat-lbl">Overdue</div></div>
    </div>
  </div>

  <!-- Desktop 2-col layout -->
  <div id="framer-layout" style="display:grid;grid-template-columns:1fr;gap:20px;">

    <!-- LEFT: Tabs + Job Panels -->
    <div id="framer-left">
      <!-- Tabs -->
      <div style="display:flex;gap:0;margin-bottom:16px;background:var(--paper);border-radius:12px;padding:4px;">
        <button id="tab-active" onclick="framerTab('active')" style="flex:1;padding:10px 4px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;background:var(--gold-dk);color:#fff;">
          🔨 Active <span id="active-badge" style="background:rgba(255,255,255,.3);border-radius:100px;padding:1px 6px;font-size:11px;margin-left:3px;"></span>
        </button>
        <button id="tab-ready" onclick="framerTab('ready')" style="flex:1;padding:10px 4px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--ink2);">
          ✅ Ready <span id="ready-badge" style="background:rgba(0,0,0,.1);border-radius:100px;padding:1px 6px;font-size:11px;margin-left:3px;"></span>
        </button>
        <button id="tab-production" onclick="framerTab('production')" style="flex:1;padding:10px 4px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--ink2);">
          🏭 Prod
        </button>
        <button id="tab-done" onclick="framerTab('done')" style="flex:1;padding:10px 4px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--ink2);">
          📦 Done
        </button>
      </div>

      <!-- Active Jobs -->
      <div id="panel-active">
        <div class="framer-panel" id="active-panel">
          <div class="framer-panel-title">🔔 Active Job Alerts</div>
          <div id="framer-notifs"><div style="font-size:13px;color:#9C8060;">Loading...</div></div>
        </div>
        <div id="framer-orders"><div class="loader"></div></div>
      </div>

      <!-- Ready -->
      <div id="panel-ready" style="display:none;">
        <div id="framer-ready-list"><div class="loader"></div></div>
      </div>

      <!-- Production Orders -->
      <div id="panel-production" style="display:none;">
        <div id="framer-production-list"><div class="loader"></div></div>
      </div>

      <!-- Completed -->
      <div id="panel-done" style="display:none;">
        <div id="framer-done"><div class="loader"></div></div>
      </div>
    </div><!-- /framer-left -->

    <!-- RIGHT: Quick Info Panel (desktop only) -->
    <div id="framer-right" style="display:none;">
      <div class="framer-panel" style="margin-bottom:16px;position:sticky;top:calc(var(--hh,56px) + 16px);">
        <div class="framer-panel-title" style="font-size:16px;margin-bottom:12px;">📋 Quick Summary</div>
        <div id="framer-summary-content" style="font-size:13px;color:rgba(255,255,255,.7);line-height:1.8;">
          <div style="margin-bottom:8px;">⏳ <b style="color:#E8C06A;">Today's Jobs</b> → <span id="qs-today">—</span></div>
          <div style="margin-bottom:8px;">📦 <b style="color:#E8C06A;">Total Active</b> → <span id="qs-active">—</span></div>
          <div style="margin-bottom:8px;">✅ <b style="color:#E8C06A;">Ready to Deliver</b> → <span id="qs-ready">—</span></div>
          <div style="margin-bottom:8px;">⚠️ <b style="color:#e53935;">Overdue</b> → <span id="qs-overdue">—</span></div>
        </div>
        <div style="border-top:1px solid rgba(255,255,255,.1);margin-top:16px;padding-top:16px;">
          <div class="framer-panel-title" style="font-size:14px;margin-bottom:10px;">🕐 Last Updated</div>
          <div id="framer-last-update" style="font-size:12px;color:rgba(255,255,255,.4);">Live</div>
        </div>
      </div>
    </div><!-- /framer-right -->

  </div><!-- /framer-layout -->
</div>

<script src="../shared.js?v=1779655140"></script>
<script>
// ── Firebase (non-module version) ────────────────────────────
const FRAMER_FIREBASE_CONFIG = {
  apiKey: "AIzaSyAerxTK5t5tYqDJ-AZg5_BMZJEk3pRD0uI",
  authDomain: "foto-vision-studio-pro.firebaseapp.com",
  projectId: "foto-vision-studio-pro",
  storageBucket: "foto-vision-studio-pro.firebasestorage.app",
  messagingSenderId: "1055550886532",
  appId: "1:1055550886532:web:d6c13af3493fddb14428d1"
};

let framerDb, framerOrders = [], framerUseLocal = false;

function framerInitDB() {
  // Try Firebase via CDN globals
  if (typeof firebase !== 'undefined') {
    try {
      if (!firebase.apps.length) firebase.initializeApp(FRAMER_FIREBASE_CONFIG);
      // Initialize Firebase Storage for photo viewing
      try {
        const bucketURL = `gs://${FRAMER_FIREBASE_CONFIG.storageBucket}`;
        window._storage = firebase.storage(firebase.app(), bucketURL);
        window.firebaseApp = firebase.app();
        console.log('✅ Framer: Firebase Storage ready');
      } catch(e) {
        try { window._storage = firebase.storage(); } catch(e2) {}
      }
      framerDb = firebase.firestore();
      framerDb.collection('orders').orderBy('created','desc')
        .onSnapshot(snap => {
          framerOrders = snap.docs.map(d => ({id:d.id,...d.data()}));
          framerRender();
        }, err => {
          console.error('Firestore error:', err);
          framerFallback();
        });
      return;
    } catch(e) { console.error('Firebase init error:', e); }
  }
  framerFallback();
}

function framerFallback() {
  framerUseLocal = true;
  framerOrders = JSON.parse(localStorage.getItem('fv_orders')||'[]');
  framerRender();
  syncFramerSummary();
}

function orderNeedsFramer(o) {
  // Instant orders are auto-delivered — never send to framer queue
  if (o.orderType === 'Instant') return false;
  return (o.cartItems||[]).some(item => {
    const svcs = item.svcs||[item.svc]||[];
    if (svcs.includes('Framing')) return true;
    if (svcs.includes('Printing') && /Sun Board|MDF|Stretcher/i.test(item.label||'')) return true;
    return false;
  });
}

let framerCurrentTab = 'active';

window.framerTab = function(tab) {
  framerCurrentTab = tab;
  ['active','ready','production','done'].forEach(t=>{
    const p=document.getElementById('panel-'+t);
    const b=document.getElementById('tab-'+t);
    if(p) p.style.display=t===tab?'block':'none';
    if(b){b.style.background=t===tab?'var(--gold-dk)':'transparent';b.style.color=t===tab?'#fff':'var(--ink2)';}
  });
  if(tab==='production') renderFramerProduction();
  else framerRender();
};

function renderFramerProduction() {
  const el=document.getElementById('framer-production-list');
  if(!el)return;
  const pos=JSON.parse(localStorage.getItem('fv_production_orders')||'[]');
  const active=pos.filter(p=>p.status!=='Complete');
  const done=pos.filter(p=>p.status==='Complete');
  if(!pos.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">🏭</div><div class="empty-title">No production orders</div><div class="empty-sub">Owner will send jobs here</div></div>';return;}
  const card=(p)=>`<div class="job-card" style="${p.status==='Complete'?'opacity:.6;':''}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
      <div>
        <div style="font-size:16px;font-weight:700;">${p.name}</div>
        <div style="font-size:12px;color:var(--ink3);">${p.code||''} · ${p.fw}×${p.fh}" · ${p.msize}</div>
        <div style="font-size:12px;color:var(--ink3);">Mount: ${p.mount==='Yes'?p.mountSize+'"':'No'} · Qty: ${p.qty} frames</div>
        ${p.notes?`<div style="font-size:12px;padding:6px 8px;background:#fff3e0;border-radius:6px;margin-top:4px;">📝 ${p.notes}</div>`:''}
      </div>
      <span style="padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;background:${p.status==='Complete'?'#e8f5e9':p.status==='In Progress'?'#e3f2fd':'#fff3e0'};color:${p.status==='Complete'?'#2e7d32':p.status==='In Progress'?'#1565c0':'#e65100'};">${p.status}</span>
    </div>
    ${p.status!=='Complete'?`<div style="display:flex;gap:8px;">
      ${p.status==='Pending'?`<button onclick="framerStartPO('${p.id}')" style="flex:1;background:#1976d2;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;">🔨 Start</button>`:''}
      <button onclick="framerCompletePO('${p.id}')" style="flex:1;background:#388e3c;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;">✅ Complete → Add to Stock</button>
    </div>`:''}
  </div>`;
  el.innerHTML=(active.length?`<div style="font-weight:700;font-size:14px;margin-bottom:8px;">🔨 Active (${active.length})</div>${active.map(card).join('')}`:'')+(done.length?`<div style="font-weight:700;font-size:14px;margin:12px 0 8px;">✅ Done</div>${done.map(card).join('')}`:'');
}

window.framerStartPO=function(id){
  const pos=JSON.parse(localStorage.getItem('fv_production_orders')||'[]');
  const idx=pos.findIndex(p=>p.id===id);if(idx<0)return;
  pos[idx].status='In Progress';
  localStorage.setItem('fv_production_orders',JSON.stringify(pos));
  renderFramerProduction();
};

window.framerCompletePO=function(id){
  const pos=JSON.parse(localStorage.getItem('fv_production_orders')||'[]');
  const idx=pos.findIndex(p=>p.id===id);if(idx<0)return;
  const po=pos[idx];pos[idx].status='Complete';
  localStorage.setItem('fv_production_orders',JSON.stringify(pos));
  const stock=JSON.parse(localStorage.getItem('fv_stock')||'[]');
  stock.push({id:'STK-'+Date.now(),code:po.code||'',name:po.name,qty:po.qty,sellingPrice:po.sellingPrice||0,costPrice:0,category:'Readymade Frames',created:Date.now()});
  localStorage.setItem('fv_stock',JSON.stringify(stock));
  renderFramerProduction();
  alert(`✅ ${po.qty} frames marked complete & added to Readymade Stock!`);
};

function framerCard(o, showActions) {
  const isReady = o.status==='Ready';
  const isOD    = o.delivery && o.delivery.slice(0,10) < todayStr() && o.status!=='Delivered';
  const cardStyle = isOD ? 'background:#ffcdd2;border-left:5px solid #c62828;border-top:1px solid #ef9a9a;' : '';
  // FIREBASE STORAGE: Use photoURLs from Firestore first
  const photoStore = JSON.parse(localStorage.getItem('fv_order_photos')||'{}');
  const photos = (o.photoURLs?.length ? o.photoURLs : null)
    || photoStore[o.id] || photoStore[o.billNo] || photoStore[o.localId]
    || o.photos || o._photos || [];
  // Make URLs absolute for cross-device loading
  const resolvedPhotos = photos.map(p => p.startsWith('http') ? p : p);

  return `<div class="job-card${o.status==='Delivered'?' delivered':''}" style="${cardStyle}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px;">
      <div>
        <div style="font-size:16px;font-weight:700;margin-bottom:2px;">${o.name||''}${isOD?' <span style="background:#c62828;color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;">⚠️ OVERDUE</span>':''}</div>
        <div style="font-size:11px;color:var(--ink3);">${o.billNo||o.id.slice(0,8)} · 👤 ${o.staff||''}</div>
      </div>
      <span style="padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;white-space:nowrap;
        background:${o.status==='Ready'?'#e8f5e9':o.status==='Delivered'?'#eee':'#fff3e0'};
        color:${o.status==='Ready'?'#2e7d32':o.status==='Delivered'?'#666':'#e65100'};">
        ${o.status==='Ready'?'✅':o.status==='Delivered'?'📦':'🔨'} ${o.status}
      </span>
    </div>
    ${o.delivery?`<div style="background:#fff3e0;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:13px;font-weight:700;color:#e65100;">⏰ Delivery: ${formatDelivery(o.delivery)}</div>`:''}
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:${photos.length?'8':'12'}px;">
      ${(o.cartItems||[]).map(item=>typeof renderServiceTree==='function'?renderServiceTree(item,true,true):`<div style="background:var(--paper);border-radius:8px;padding:10px;border-left:3px solid var(--gold-dk);"><div style="font-weight:700;font-size:13px;color:var(--gold-dk);">${(item.svcs||[item.svc]).join(' + ')}</div><div style="font-size:11px;">• ${item.label||'—'}</div></div>`).join('')}
    </div>
    ${photos.length?`<div style="margin-bottom:12px;">
      <div style="font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px;">📸 Reference Photos (${photos.length})</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${photos.map((src,i)=>`<img src="${src}" onclick="event.stopPropagation();framerViewPhoto(${i},'${o.id}')" style="width:70px;height:70px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid var(--paper3);">`).join('')}
      </div>
    </div>`:''}
    ${o.notes?`<div style="font-size:12px;color:var(--ink3);background:var(--paper);padding:8px 12px;border-radius:8px;margin-bottom:10px;">📝 ${o.notes}</div>`:''}
    ${showActions?`<div style="display:flex;gap:8px;">
      ${!isReady?`<button onclick="framerMarkReady('${o.id}')" style="flex:1;background:var(--gold-dk);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;">✅ Mark Ready</button>`:''}
      ${isReady ?`<button onclick="framerUndoReady('${o.id}')" style="flex:1;background:#fff;color:#e53935;border:2px solid #e53935;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;">↩️ Undo Ready</button>`:''}
    </div>`:''}
  </div>`;
}

window.framerViewPhoto = function(idx, orderId) {
  // FIX 40: Use photoURLs from Firestore first for cross-device access
  const photoStore=JSON.parse(localStorage.getItem('fv_order_photos')||'{}');
  const o2=(framerOrders||orders||[]).find(x=>x.id===orderId);
  const photos=(o2?.photoURLs?.length?o2.photoURLs:null)
    ||photoStore[orderId]||photoStore[o2?.billNo]||o2?.photos||o2?._photos||[];
  if(!photos.length){console.warn('No photos found for',orderId);return;}
  const src = photos[+idx];
  if(!src){return;}
  openPhotoModal(src);
};

window.openPhotoModal = function(src) {
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:99999;display:flex;align-items:center;justify-content:center;cursor:pointer;';
  modal.onclick=()=>modal.remove();
  modal.innerHTML=`<img src="${src}" style="max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px;" onclick="event.stopPropagation()">
    <button onclick="this.parentElement.remove()" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,.25);color:#fff;border:none;border-radius:100%;width:40px;height:40px;font-size:22px;cursor:pointer;line-height:1;">✕</button>`;
  document.body.appendChild(modal);
};

function framerRender() {
  try {
    const today = todayStr();
    const fo = framerOrders.filter(o=>orderNeedsFramer(o));
    const activeJobs = fo.filter(o=>o.status==='Pending'||o.status==='In Progress').sort((a,b)=>(b.created||0)-(a.created||0));
    const readyJobs  = fo.filter(o=>o.status==='Ready').sort((a,b)=>(b.created||0)-(a.created||0));
    const doneJobs   = fo.filter(o=>o.status==='Delivered').sort((a,b)=>(b.created||0)-(a.created||0));
    const overdue    = activeJobs.filter(o=>o.delivery&&o.delivery.slice(0,10)<today);
    const dueToday   = activeJobs.filter(o=>o.delivery&&o.delivery.slice(0,10)===today);

    // Update badges
    const ab=document.getElementById('active-badge'); if(ab) ab.textContent=activeJobs.length||'';
    const rb=document.getElementById('ready-badge'); if(rb) rb.textContent=readyJobs.length||'';
    // Update stats
    const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
    set('fs-today',fo.filter(o=>o.date===today).length);
    set('fs-active',activeJobs.length);
    set('fs-duetoday',dueToday.length);
    set('fs-overdue',overdue.length);

    if(framerCurrentTab==='active') {
      // Alerts — only Pending + In Progress, clickable
      document.getElementById('framer-notifs').innerHTML = activeJobs.length
        ? activeJobs.slice(0,6).map(o=>{
            const isOD=o.delivery&&o.delivery.slice(0,10)<today;
            return `<div onclick="framerOpenDetail('${o.id}')" class="job-notif" style="cursor:pointer;${isOD?'color:#c62828;background:#ffcdd2;border-radius:8px;padding:4px 6px;':''}">
              <div class="job-dot" style="${isOD?'background:#c62828;':''}"></div>
              <div>
                <div class="job-text"><b>${o.name}</b> · <b>${o.status}</b>${isOD?' ⚠️ OVERDUE':''}</div>
                <div class="job-time">👤 ${o.staff||''}${o.delivery?' · ⏰ '+formatDelivery(o.delivery):''}</div>
              </div>
            </div>`;
          }).join('')
        : '<div style="font-size:13px;color:#9C8060;padding:6px 0;">✅ All caught up! No pending jobs.</div>';

      if(!activeJobs.length) {
        document.getElementById('framer-orders').innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-title">All caught up!</div><div class="empty-sub">No active framing orders</div></div>';
        return;
      }
      const upcoming = activeJobs.filter(o=>o.delivery&&o.delivery.slice(0,10)>today);
      const nodue    = activeJobs.filter(o=>!o.delivery);
      const section=(title,color,bg,list)=>{
        if(!list.length) return '';
        return `<div style="margin-bottom:14px;"><div style="font-weight:700;font-size:12px;color:${color};padding:5px 10px;background:${bg};border-radius:8px;margin-bottom:8px;border-left:3px solid ${color};">${title}</div>${list.map(o=>framerCard(o,true)).join('')}</div>`;
      };
      document.getElementById('framer-orders').innerHTML =
        section('🔴 OVERDUE','#c62828','#ffcdd2',overdue)+
        section('🟡 DUE TODAY','#e65100','#fff3e0',dueToday.filter(o=>!overdue.includes(o)))+
        section('🔵 UPCOMING','#1976d2','#e3f2fd',upcoming)+
        section('📋 NO DUE DATE','#666','#f5f5f5',nodue);

    } else if(framerCurrentTab==='ready') {
      const el=document.getElementById('framer-ready-list');
      if(el) el.innerHTML = readyJobs.length
        ? readyJobs.map(o=>`<div class="job-card" style="background:#e8f5e9;border-left:4px solid #388e3c;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <div><div style="font-weight:700;">${o.name}</div><div style="font-size:12px;color:var(--ink3);">${o.billNo||o.id.slice(0,8)}</div></div>
              <span style="background:#388e3c;color:#fff;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;">✅ Ready</span>
            </div>
            ${renderServiceTree(o.cartItems?.[0],true,true)||''}
            <div style="display:flex;gap:8px;margin-top:8px;">
              <button onclick="framerUndoReady('${o.id}')" style="flex:1;background:#f5f5f5;color:#333;border:none;border-radius:8px;padding:8px;font-size:12px;cursor:pointer;">↩️ Undo</button>
            </div>
          </div>`).join('')
        : '<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">No ready orders</div></div>';

    } else if(framerCurrentTab==='done') {
      const el=document.getElementById('framer-done');
      if(el) el.innerHTML = doneJobs.length
        ? doneJobs.map(o=>framerCard(o,false)).join('')
        : '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">No completed orders yet</div></div>';
    }
  } catch(err) {
    console.error('framerRender error:',err);
  }
}

window.framerOpenDetail = function(id) {
  const o = framerOrders.find(x=>x.id===id);
  if(!o) return;
  const modal = document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99999;display:flex;align-items:flex-end;justify-content:center;';
  modal.innerHTML=`<div style="background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-weight:700;font-size:16px;">${o.name} · ${o.billNo||o.id.slice(0,8)}</div>
      <button onclick="this.closest('[style*=fixed]').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;">✕</button>
    </div>
    ${o.delivery?`<div style="background:#fff3e0;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:13px;font-weight:700;color:#e65100;">⏰ Due: ${formatDelivery(o.delivery)}</div>`:''}
    ${(o.cartItems||[]).map(item=>typeof renderServiceTree==='function'?renderServiceTree(item,false,true):'').join('')}
    ${o.notes?`<div style="background:#fff3cd;border-radius:8px;padding:10px;margin-top:8px;font-size:13px;">📝 ${o.notes}</div>`:''}
    ${(()=>{
      const photos=[...(o.refPhotos||[]),(o.refPhoto?[o.refPhoto]:[])].flat().filter(Boolean);
      if(!photos.length) return '';
      return `<div style="margin-top:14px;">
        <div style="font-size:12px;font-weight:700;color:#666;margin-bottom:8px;">📸 Reference Photos (${photos.length})</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${photos.map((src,i)=>`<img src="${src}" onclick="framerViewPhoto(${i},'${o.id}')" style="width:80px;height:80px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid #ddd;">`).join('')}
        </div>
      </div>`;
    })()}
    ${o.status!=='Ready'?`<button onclick="framerMarkReady('${o.id}');this.closest('[style*=fixed]').remove();" style="width:100%;margin-top:16px;background:#388e3c;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;">✅ Mark Ready</button>`:'<div style="text-align:center;color:#388e3c;font-weight:700;margin-top:12px;">✅ Already Ready</div>'}
  </div>`;
  document.body.appendChild(modal);
};

window.framerMarkReady = async function(id) {
  if(framerUseLocal){framerOrders=framerOrders.map(o=>o.id===id?{...o,status:'Ready'}:o);localStorage.setItem('fv_orders',JSON.stringify(framerOrders));}
  else { try{await framerDb.collection('orders').doc(id).update({status:'Ready'});}catch(e){toast('Error','error');return;} }
  toast('✅ Order marked Ready!','success');
  framerRender(); // re-render current tab — card auto-moves since Ready filters are different
  // Switch to Ready tab to show it
  framerTab('ready');
};

window.framerUndoReady = async function(id) {
  if(!confirm('⚠️ Move order back to In Progress?')) return;
  if(framerUseLocal){framerOrders=framerOrders.map(o=>o.id===id?{...o,status:'In Progress'}:o);localStorage.setItem('fv_orders',JSON.stringify(framerOrders));framerRender();}
  else { try{await framerDb.collection('orders').doc(id).update({status:'In Progress'});}catch(e){toast('Error','error');return;} }
  toast('↩️ Moved back to In Progress');
};

window.doLogout = doLogout;
if(!requireRole('framer')) { window.location.href='../index.html'; }
framerOrders = JSON.parse(localStorage.getItem('fv_orders')||'[]');
framerRender();
function syncFramerSummary() {
  try {
    const today = new Date().toISOString().slice(0,10);
    const active = framerOrders.filter(o => orderNeedsFramer(o) && o.status !== 'Delivered' && o.status !== 'Ready');
    const ready  = framerOrders.filter(o => orderNeedsFramer(o) && o.status === 'Ready');
    const overdue = framerOrders.filter(o => orderNeedsFramer(o) && o.status !== 'Delivered' && o.delivery && o.delivery < today);
    const todayJobs = framerOrders.filter(o => orderNeedsFramer(o) && (o.date||'').startsWith(today));
    const set = (id, v) => { const el = document.getElementById(id); if(el) el.textContent = v; };
    set('qs-today', todayJobs.length);
    set('qs-active', active.length);
    set('qs-ready', ready.length);
    set('qs-overdue', overdue.length);
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
    set('framer-last-update', '🟢 Live · ' + timeStr);
  } catch(e) { console.error('syncFramerSummary error:', e); }
}

framerInitDB();
</script>
