<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="apple-touch-icon" href="../logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Foto Vision">
<meta name="theme-color" content="#0F0F0F">
<title>Framer View — Fotovision Studio Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<!-- Firebase compat (non-module) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
.framer-hero{
  background:linear-gradient(135deg,#0F0F0F,#1C1410);
  border-radius:var(--r-xl);
  padding:32px 28px;
  margin-bottom:20px;
  color:#fff;
  position:relative;
  overflow:hidden;
}
.framer-hero::before{
  content:'🖼️';font-size:120px;position:absolute;right:-10px;top:50%;transform:translateY(-50%);opacity:.06;pointer-events:none;
}
.framer-hero-title{font-family:'DM Serif Display',serif;font-size:28px;color:#E8C06A;margin-bottom:6px;}
.framer-hero-sub{font-size:13px;color:rgba(255,255,255,.5);}
.framer-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:20px;}
.framer-stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-md);padding:14px;text-align:center;}
.framer-stat-val{font-family:'DM Serif Display',serif;font-size:28px;color:#E8C06A;line-height:1;}
.framer-stat-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.07em;margin-top:4px;}
.job-card{
  background:#fff;
  border:1px solid var(--paper3);
  border-radius:var(--r-lg);
  padding:20px;
  margin-bottom:10px;
  box-shadow:var(--sh-sm);
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.job-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(to bottom,var(--gold-dk),var(--gold));}
.job-card.delivered::before{background:var(--ink3);}
.job-card:hover{box-shadow:var(--sh-md);}
</style>
</head>
<body>

<header class="hdr">
  <a href="../index.html" class="hdr-logo">
    <img src="../logo.png" alt="FV" style="height:42px;border-radius:10px;display:block;">
  </a>
  <div class="hdr-right">
    <div class="role-pill">🖼️ Framer</div>
    <button class="btn-logout" onclick="doLogout()">Sign Out</button>
  </div>
</header>

<div class="main" style="max-width:800px;">

  <!-- Hero -->
  <div class="framer-hero">
    <div class="framer-hero-title">Framing Workshop</div>
    <div class="framer-hero-sub">Live view of all framing, sunboard & MDF jobs assigned to your station</div>
    <div class="framer-stats" style="grid-template-columns:1fr 1fr 1fr 1fr;">
      <div class="framer-stat"><div class="framer-stat-val" id="fs-today">0</div><div class="framer-stat-lbl">Today's Jobs</div></div>
      <div class="framer-stat"><div class="framer-stat-val" id="fs-active">0</div><div class="framer-stat-lbl">Total Due</div></div>
      <div class="framer-stat"><div class="framer-stat-val" id="fs-duetoday">0</div><div class="framer-stat-lbl">Due Today</div></div>
      <div class="framer-stat" style="background:#e53935;"><div class="framer-stat-val" id="fs-overdue">0</div><div class="framer-stat-lbl">Overdue</div></div>
    </div>
  </div>

  <!-- Tabs -->
  <div style="display:flex;gap:0;margin-bottom:16px;background:var(--paper);border-radius:12px;padding:4px;">
    <button id="tab-active" onclick="framerTab('active')" style="flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:var(--gold-dk);color:#fff;">
      🔨 Active Jobs <span id="active-badge" style="background:rgba(255,255,255,.3);border-radius:100px;padding:1px 7px;font-size:11px;margin-left:4px;"></span>
    </button>
    <button id="tab-done" onclick="framerTab('done')" style="flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:transparent;color:var(--ink2);">
      ✅ Completed
    </button>
  </div>

  <!-- Active Jobs -->
  <div id="panel-active">
    <div class="framer-panel" id="active-panel">
      <div class="framer-panel-title">🔔 Active Job Alerts</div>
      <div id="framer-notifs"><div style="font-size:13px;color:#9C8060;">Loading...</div></div>
    </div>
    <div id="framer-orders"><div class="loader"></div></div>
  </div>

  <!-- Completed -->
  <div id="panel-done" style="display:none;">
    <div id="framer-done"><div class="loader"></div></div>
  </div>

</div>

<script src="../shared.js"></script>
<script>
// ── Firebase (non-module version) ────────────────────────────
const FRAMER_FIREBASE_CONFIG = {
  apiKey: "AIzaSyAerxTK5t5tYqDJ-AZg5_BMZJEk3pRD0uI",
  authDomain: "foto-vision-studio-pro.firebaseapp.com",
  projectId: "foto-vision-studio-pro",
  storageBucket: "foto-vision-studio-pro.firebasestorage.app",
  messagingSenderId: "1055550886532",
  appId: "1:1055550886532:web:d6c13af3493fddb14428d1"
};

let framerDb, framerOrders = [], framerUseLocal = false;

function framerInitDB() {
  // Try Firebase via CDN globals
  if (typeof firebase !== 'undefined') {
    try {
      if (!firebase.apps.length) firebase.initializeApp(FRAMER_FIREBASE_CONFIG);
      framerDb = firebase.firestore();
      framerDb.collection('orders').orderBy('created','desc')
        .onSnapshot(snap => {
          framerOrders = snap.docs.map(d => ({id:d.id,...d.data()}));
          framerRender();
        }, err => {
          console.error('Firestore error:', err);
          framerFallback();
        });
      return;
    } catch(e) { console.error('Firebase init error:', e); }
  }
  framerFallback();
}

function framerFallback() {
  framerUseLocal = true;
  framerOrders = JSON.parse(localStorage.getItem('fv_orders')||'[]');
  framerRender();
}

function orderNeedsFramer(o) {
  return (o.cartItems||[]).some(item => {
    const svcs = item.svcs||[item.svc]||[];
    if (svcs.includes('Framing')) return true;
    if (svcs.includes('Printing') && /Sun Board|MDF|Stretcher/i.test(item.label||'')) return true;
    return false;
  });
}

let framerCurrentTab = 'active';

window.framerTab = function(tab) {
  framerCurrentTab = tab;
  document.getElementById('panel-active').style.display = tab==='active'?'block':'none';
  document.getElementById('panel-done').style.display   = tab==='done'?'block':'none';
  const btnA = document.getElementById('tab-active');
  const btnD = document.getElementById('tab-done');
  if(btnA){ btnA.style.background=tab==='active'?'var(--gold-dk)':'transparent'; btnA.style.color=tab==='active'?'#fff':'var(--ink2)'; }
  if(btnD){ btnD.style.background=tab==='done'?'var(--gold-dk)':'transparent'; btnD.style.color=tab==='done'?'#fff':'var(--ink2)'; }
  framerRender();
};

function framerCard(o, showActions) {
  const isReady   = o.status==='Ready';
  const isOD      = o.delivery && o.delivery.slice(0,10) < todayStr() && o.status!=='Delivered';
  const cardStyle = isOD ? 'background:linear-gradient(135deg,#fff5f5,#ffe8e8);border-left:3px solid #e53935;' : '';
  return `<div class="job-card${o.status==='Delivered'?' delivered':''}" style="${cardStyle}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px;">
      <div>
        <div style="font-size:16px;font-weight:700;margin-bottom:2px;">${o.name||''}</div>
        <div style="font-size:11px;color:var(--ink3);">${o.id||''} · 👤 ${o.staff||''}</div>
      </div>
      <span style="padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;white-space:nowrap;
        background:${o.status==='Ready'?'#e8f5e9':o.status==='Delivered'?'#eee':'#fff3e0'};
        color:${o.status==='Ready'?'#2e7d32':o.status==='Delivered'?'#666':'#e65100'};">
        ${o.status==='Ready'?'✅':o.status==='Delivered'?'📦':'🔨'} ${o.status}
      </span>
    </div>
    ${o.delivery?`<div style="background:#fff3e0;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:13px;font-weight:700;color:#e65100;">⏰ Delivery: ${formatDatetime(o.delivery)}</div>`:''}
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;">
      ${(o.cartItems||[]).map(item=>{
        const svcs=item.svcs||[item.svc]||[];
        return `<div style="background:var(--paper);border-radius:8px;padding:12px;border-left:3px solid var(--gold-dk);">
          <div style="font-weight:700;font-size:13px;color:var(--gold-dk);margin-bottom:6px;">${svcs.join(' + ')}</div>
          <div style="font-size:12px;color:var(--ink2);">${item.label||'—'}</div>
        </div>`;
      }).join('')}
    </div>
    ${o.notes?`<div style="font-size:12px;color:var(--ink3);background:var(--paper);padding:8px 12px;border-radius:8px;margin-bottom:10px;">📝 ${o.notes}</div>`:''}
    ${showActions?`<div style="display:flex;gap:8px;">
      ${!isReady?`<button onclick="framerMarkReady('${o.id}')" style="flex:1;background:var(--gold-dk);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;">✅ Mark Ready</button>`:''}
      ${isReady ?`<button onclick="framerUndoReady('${o.id}')" style="flex:1;background:#fff;color:#e53935;border:2px solid #e53935;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;">↩️ Undo Ready</button>`:''}
    </div>`:''}
  </div>`;
}

function framerRender() {
  try {
    const today = todayStr();
    const fo = framerOrders.filter(o=>orderNeedsFramer(o));
    // Only show Pending + In Progress + Ready (not Delivered)
    const active = fo.filter(o=>o.status!=='Delivered').sort((a,b)=>(b.created||0)-(a.created||0));
    const done   = fo.filter(o=>o.status==='Delivered').sort((a,b)=>(b.created||0)-(a.created||0));

    const todayJobs = active.filter(o=>o.date===today);
    const dueToday  = active.filter(o=>o.delivery&&o.delivery.startsWith(today));
    const overdue   = active.filter(o=>o.delivery&&o.delivery.slice(0,10)<today&&o.status!=='Delivered');

    document.getElementById('fs-today').textContent   = todayJobs.length;
    document.getElementById('fs-active').textContent  = active.length;
    document.getElementById('fs-duetoday').textContent= dueToday.length;
    document.getElementById('fs-overdue').textContent = overdue.length;

    const badge = document.getElementById('active-badge');
    if(badge) badge.textContent = active.length>0 ? active.length : '';

    if(framerCurrentTab==='active') {
      // Alerts — active jobs
      document.getElementById('framer-notifs').innerHTML = active.length
        ? active.slice(0,5).map(o=>`<div class="job-notif" style="${o.delivery&&o.delivery.slice(0,10)<today?'color:#e53935;':''}">
            <div class="job-dot" style="${o.delivery&&o.delivery.slice(0,10)<today?'background:#e53935;':''}"></div>
            <div>
              <div class="job-text"><b>${o.name}</b> · <b>${o.status}</b></div>
              <div class="job-time">👤 ${o.staff||''}${o.delivery?' · ⏰ '+formatDatetime(o.delivery):''}</div>
            </div>
          </div>`).join('')
        : '<div style="font-size:13px;color:#9C8060;">No active framing jobs 🎉</div>';

      if(!active.length) {
        document.getElementById('framer-orders').innerHTML = '<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-title">All caught up!</div><div class="empty-sub">No active framing orders</div></div>';
        return;
      }

      // Sections: Overdue → Due Today → Upcoming → No due date
      const upcoming  = active.filter(o=>o.delivery&&o.delivery.slice(0,10)>today);
      const nodue     = active.filter(o=>!o.delivery);

      const section = (title,color,bg,list) => {
        if(!list.length) return '';
        return `<div style="margin-bottom:14px;">
          <div style="font-weight:700;font-size:12px;color:${color};padding:5px 10px;background:${bg};border-radius:8px;margin-bottom:8px;border-left:3px solid ${color};">${title}</div>
          ${list.map(o=>framerCard(o,true)).join('')}
        </div>`;
      };

      document.getElementById('framer-orders').innerHTML =
        section('🔴 OVERDUE','#e53935','#ffe8e8',overdue) +
        section('🟡 DUE TODAY','#e65100','#fff3e0',dueToday.filter(o=>!overdue.includes(o))) +
        section('🔵 UPCOMING','#1976d2','#e3f2fd',upcoming) +
        section('📋 NO DUE DATE','#666','#f5f5f5',nodue);

    } else {
      document.getElementById('framer-done').innerHTML = done.length
        ? done.map(o=>framerCard(o,false)).join('')
        : '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">No completed orders yet</div></div>';
    }
  } catch(err) {
    console.error('framerRender error:',err);
    document.getElementById('framer-notifs').innerHTML='<div style="color:#888;font-size:13px;">No active jobs</div>';
    document.getElementById('framer-orders').innerHTML='<div style="padding:20px;text-align:center;color:#888;">Loading...</div>';
  }
}

window.framerMarkReady = async function(id) {
  if(framerUseLocal){framerOrders=framerOrders.map(o=>o.id===id?{...o,status:'Ready'}:o);localStorage.setItem('fv_orders',JSON.stringify(framerOrders));framerRender();}
  else { try{await framerDb.collection('orders').doc(id).update({status:'Ready'});}catch(e){toast('Error','error');return;} }
  toast('✅ Order marked Ready!','success');
};

window.framerUndoReady = async function(id) {
  if(!confirm('⚠️ Move order back to In Progress?')) return;
  if(framerUseLocal){framerOrders=framerOrders.map(o=>o.id===id?{...o,status:'In Progress'}:o);localStorage.setItem('fv_orders',JSON.stringify(framerOrders));framerRender();}
  else { try{await framerDb.collection('orders').doc(id).update({status:'In Progress'});}catch(e){toast('Error','error');return;} }
  toast('↩️ Moved back to In Progress');
};

window.doLogout = doLogout;
if(!requireRole('framer')) { window.location.href='../index.html'; }
framerOrders = JSON.parse(localStorage.getItem('fv_orders')||'[]');
framerRender();
framerInitDB();
</script>
</body>
</html>
